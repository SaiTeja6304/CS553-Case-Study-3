services:
  backend:
    image: ipatel0/vlm-chat-backend:latest
    container_name: vlm-chat-backend
    ports:
      - "22012:22012"
    environment:
      - HF_TOKEN=${HF_TOKEN}
    networks:
      - vlm-chat-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:22012/api/']
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  frontend:
    image: ssunku6/vlm-chat-frontend:latest
    container_name: vlm-chat-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "22011:22011"
    expose:
      - '22013'
    networks:
      - vlm-chat-network
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: vlm-chat-ngrok
    depends_on:
      - frontend
    command: http frontend:22011
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "22015:4040"
    networks:
      - vlm-chat-network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: vlm-chat-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - vlm-chat-network
    restart: unless-stopped
  
  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: vlm-chat-node-exporter
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro
    pid: host
    networks:
      - vlm-chat-network
    restart: unless-stopped
  
  prometheus:
    image: prom/prometheus:latest
    container_name: vlm-chat-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '22013:9090'
    depends_on:
      - frontend
      - backend
      - cadvisor
      - node-exporter
    networks:
      - vlm-chat-network
    restart: unless-stopped
  
  grafana:
    image: grafana/grafana:latest
    container_name: vlm-chat-grafana
    ports:
      - "22014:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - vlm-chat-network
    restart: unless-stopped
  
  ngrok-grafana:
    image: ngrok/ngrok:latest
    container_name: vlm-chat-ngrok-grafana
    depends_on:
      - grafana
    command: http grafana:3000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "22016:4040"
    networks:
      - vlm-chat-network
    restart: unless-stopped
  
networks:
  vlm-chat-network:
    driver: bridge

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
